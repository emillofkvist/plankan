<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plankan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #111;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 16px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 28px;
            color: #fff;
        }

        .dropdown-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 36px;
        }

        .dropdown-wrapper label {
            font-size: 0.9rem;
            color: #888;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        select {
            background: #1e1e1e;
            color: #fff;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 8px 16px;
            font-size: 1rem;
            cursor: pointer;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
            text-align: center;
        }

        select:focus {
            border-color: #5ede80;
        }

        .timers {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 340px;
        }

        .timer-card {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 28px 24px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            border: 1px solid #252525;
            transition: opacity 0.4s;
        }

        .timer-card.done {
            opacity: 0.45;
        }

        .set-label {
            font-size: 0.8rem;
            color: #555;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .ring-container {
            position: relative;
            width: 150px;
            height: 150px;
        }

        .ring-svg {
            transform: rotate(-90deg);
        }

        .ring-bg {
            fill: none;
            stroke: #252525;
            stroke-width: 9;
        }

        .ring-progress {
            fill: none;
            stroke: #5ede80;
            stroke-width: 9;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear, stroke 0.3s;
        }

        .timer-card.done .ring-progress {
            stroke: #333;
        }

        .ring-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.4rem;
            font-weight: 700;
            color: #fff;
            line-height: 1;
            letter-spacing: -1px;
        }

        .ring-center.waiting {
            font-size: 1.6rem;
            color: #5ede80;
        }

        .ring-center.klar {
            font-size: 1.2rem;
            color: #555;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .start-btn {
            background: #5ede80;
            color: #111;
            border: none;
            border-radius: 12px;
            padding: 13px 0;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            max-width: 180px;
            transition: background 0.2s, transform 0.1s, opacity 0.2s;
        }

        .start-btn:hover:not(:disabled) {
            background: #4dcc6e;
        }

        .start-btn:active:not(:disabled) {
            transform: scale(0.96);
        }

        .start-btn:disabled {
            background: #222;
            color: #444;
            cursor: not-allowed;
        }

        .start-btn.running {
            background: #222;
            color: #5ede80;
        }
    </style>
</head>
<body>

    <h1>Plankan</h1>

    <div class="dropdown-wrapper">
        <label for="duration">Tid</label>
        <select id="duration">
            <option value="20" selected>20 s</option>
            <option value="25">25 s</option>
            <option value="30">30 s</option>
            <option value="35">35 s</option>
            <option value="40">40 s</option>
            <option value="45">45 s</option>
            <option value="50">50 s</option>
            <option value="55">55 s</option>
            <option value="60">60 s</option>
        </select>
    </div>

    <div class="timers" id="timers"></div>

    <script>
        const RADIUS = 58;
        const CIRCUMFERENCE = 2 * Math.PI * RADIUS;

        let activeIndex = null;

        const timers = [
            { state: 'idle', interval: null, delayTimeout: null },
            { state: 'idle', interval: null, delayTimeout: null },
            { state: 'idle', interval: null, delayTimeout: null },
        ];

        function getDuration() {
            return parseInt(document.getElementById('duration').value);
        }

        function playBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                [0, 0.25, 0.5].forEach(delay => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'sine';
                    osc.frequency.value = 880;
                    gain.gain.setValueAtTime(0, ctx.currentTime + delay);
                    gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + delay + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.2);
                    osc.start(ctx.currentTime + delay);
                    osc.stop(ctx.currentTime + delay + 0.3);
                });
            } catch (e) {}
        }

        function setRing(index, remaining, total) {
            const ring = document.getElementById(`ring-${index}`);
            const offset = CIRCUMFERENCE * (1 - remaining / total);
            ring.style.strokeDashoffset = offset;
        }

        function resetTimerUI(index) {
            const duration = getDuration();
            const card = document.getElementById(`card-${index}`);
            const text = document.getElementById(`text-${index}`);
            const btn = document.getElementById(`btn-${index}`);
            const ring = document.getElementById(`ring-${index}`);

            ring.style.transition = 'none';
            ring.style.strokeDashoffset = '0';
            setTimeout(() => { ring.style.transition = 'stroke-dashoffset 1s linear, stroke 0.3s'; }, 50);

            text.textContent = duration;
            text.className = 'ring-center';
            card.classList.remove('done');
            btn.disabled = false;
            btn.textContent = 'Starta';
            btn.className = 'start-btn';
        }

        function stopTimer(index, reset = true) {
            const t = timers[index];
            if (t.delayTimeout) { clearTimeout(t.delayTimeout); t.delayTimeout = null; }
            if (t.interval) { clearInterval(t.interval); t.interval = null; }
            if (t.state !== 'done') {
                t.state = 'idle';
                if (reset) resetTimerUI(index);
            }
            if (activeIndex === index) activeIndex = null;
        }

        function startTimer(index) {
            if (timers[index].state === 'done') return;

            // Stop whatever is currently running
            if (activeIndex !== null && activeIndex !== index) {
                stopTimer(activeIndex, true);
            }
            activeIndex = index;

            const duration = getDuration();
            const t = timers[index];
            t.state = 'running';

            const text = document.getElementById(`text-${index}`);
            const btn = document.getElementById(`btn-${index}`);
            const ring = document.getElementById(`ring-${index}`);

            // Disable button, show delay indicator
            btn.disabled = true;
            btn.className = 'start-btn running';
            btn.textContent = 'Startar...';
            text.textContent = '▶';
            text.className = 'ring-center waiting';

            // Reset ring without transition
            ring.style.transition = 'none';
            ring.style.strokeDashoffset = '0';

            t.delayTimeout = setTimeout(() => {
                t.delayTimeout = null;
                if (t.state !== 'running') return;

                let remaining = duration;
                text.textContent = remaining;
                text.className = 'ring-center';
                btn.textContent = 'Kör...';

                // Enable transition for countdown
                setTimeout(() => { ring.style.transition = 'stroke-dashoffset 1s linear, stroke 0.3s'; }, 20);
                setRing(index, remaining, duration);

                t.interval = setInterval(() => {
                    remaining--;

                    if (remaining <= 0) {
                        clearInterval(t.interval);
                        t.interval = null;
                        t.state = 'done';
                        activeIndex = null;

                        setRing(index, 0, duration);
                        text.textContent = 'Klar';
                        text.className = 'ring-center klar';
                        document.getElementById(`card-${index}`).classList.add('done');
                        btn.textContent = 'Klar';
                        btn.className = 'start-btn';
                        btn.disabled = true;

                        playBeep();
                    } else {
                        setRing(index, remaining, duration);
                        text.textContent = remaining;
                    }
                }, 1000);
            }, 1000);
        }

        function buildTimer(index) {
            const duration = getDuration();
            const card = document.createElement('div');
            card.className = 'timer-card';
            card.id = `card-${index}`;
            card.innerHTML = `
                <div class="set-label">Set ${index + 1}</div>
                <div class="ring-container">
                    <svg class="ring-svg" width="150" height="150" viewBox="0 0 130 130">
                        <circle class="ring-bg" cx="65" cy="65" r="${RADIUS}" />
                        <circle class="ring-progress" id="ring-${index}"
                            cx="65" cy="65" r="${RADIUS}"
                            stroke-dasharray="${CIRCUMFERENCE}"
                            stroke-dashoffset="0" />
                    </svg>
                    <div class="ring-center" id="text-${index}">${duration}</div>
                </div>
                <button class="start-btn" id="btn-${index}">Starta</button>
            `;
            card.querySelector('.start-btn').addEventListener('click', () => startTimer(index));
            return card;
        }

        function init() {
            const container = document.getElementById('timers');
            for (let i = 0; i < 3; i++) {
                container.appendChild(buildTimer(i));
            }
        }

        document.getElementById('duration').addEventListener('change', () => {
            for (let i = 0; i < 3; i++) {
                if (timers[i].state !== 'done') {
                    stopTimer(i, true);
                }
            }
        });

        init();
    </script>

</body>
</html>
